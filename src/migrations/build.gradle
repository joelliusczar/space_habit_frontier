/*
 * This file was generated by the Gradle 'init' task.
 */


plugins {
    id 'buildlogic.java-application-conventions'
    id 'org.flywaydb.flyway' version '12.0.2'
    id 'com.gradleup.shadow' version '9.3.1'
}

dependencies {
    implementation 'org.postgresql:postgresql:42.5.4'
    implementation 'org.flywaydb:flyway-database-postgresql:12.0.2'
}


flyway {
    url = 'jdbc:postgresql://localhost:5432/space_habit_frontier_db'
    user = System.getenv('DSF_DB_OWNER_NAME')
    password = System.getenv('DSF_DB_PASS_OWNER')
    locations = ['classpath:db/migration']
}

application {
    // Define the main class for the application.
    mainClass = 'space_habit_frontier.db_migrate.App'
}

shadowJar {
    mergeServiceFiles()
    filesMatching("META-INF/services/**") {
        duplicatesStrategy = DuplicatesStrategy.INCLUDE
    }
    manifest {
        attributes 'Main-Class': application.mainClass
    }
}
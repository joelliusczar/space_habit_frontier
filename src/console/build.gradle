/*
 * This file was generated by the Gradle 'init' task.
 */

plugins {
    id 'buildlogic.java-application-conventions'
    id "org.jooq.jooq-codegen-gradle" version "3.20.4"
}

dependencies {
    implementation "org.jooq:jooq:3.20.4"
    jooqCodegen 'org.postgresql:postgresql:42.5.4'
    implementation project(':engine')
}

task(exp, dependsOn: 'classes', type: JavaExec) {
    main = 'space_habit_frontier.console.App'
    classpath = sourceSets.main.runtimeClasspath
}

jooq {
    configuration {
        jdbc {
            driver = 'org.postgresql.Driver'
            url = 'jdbc:postgresql://localhost:5432/space_habit_frontier_db'
            user = 'shf_owner'
            password = 'ownerpass'
        }

        generator {
            database {
                org.jooq.meta.postgres.PostgresDatabase
            }
        }
    }
}


